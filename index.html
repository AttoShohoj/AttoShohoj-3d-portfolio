<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AttoShohoj 3D Science Library</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #1a1a1a, #000);
  color: white;
}

/* Header */
header {
  text-align: center;
  padding: 10px;
}

/* Layout */
.container {
  display: grid;
  grid-template-columns: 1fr 280px;
  height: 90vh;
}

/* Viewer */
.viewer-box {
  position: relative;
  background: #111;
}

model-viewer {
  width: 100%;
  height: 100%;
}

/* Loading */
#loading {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 18px;
  z-index: 10;
}

/* Sidebar */
.sidebar {
  background: #0d0d0d;
  padding: 10px;
  overflow-y: auto;
}

.category {
  margin-top: 10px;
  font-weight: bold;
  color: #00ffcc;
}

.item {
  padding: 8px;
  margin: 5px 0;
  background: #222;
  cursor: pointer;
  border-radius: 6px;
}

.item:hover {
  background: #333;
}
</style>
</head>

<body>

<header>
  <h2>🚀 AttoShohoj 3D Science Library</h2>
</header>

<div class="container">

  <!-- Viewer -->
  <div class="viewer-box">
    <div id="loading">Loading Model...</div>

    <model-viewer
      id="viewer"
      src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
      auto-rotate
      camera-controls>
    </model-viewer>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <!-- CHANGED SECTION -->
    <div class="category">🧬 Zoology</div>
    <div class="item" onclick="loadModel('zoology/heart.glb')">Heart</div>
    <div class="item" onclick="loadModel('zoology/brain.glb')">Brain</div>

    <div class="category">🌿 Botany</div>
    <div class="item" onclick="loadModel('botany/leaf.glb')">Leaf</div>

    <div class="category">⚗️ Chemistry</div>
    <div class="item" onclick="loadModel('chemistry/h2o.glb')">Water (H2O)</div>

    <div class="category">⚙️ Physics</div>
    <div class="item" onclick="loadModel('physics/magnet.glb')">Magnet</div>

  </div>

</div>

<script>
const viewer = document.getElementById("viewer");
const loading = document.getElementById("loading");

function loadModel(path) {
  loading.style.display = "block";

  viewer.src = "models/" + path;

  viewer.addEventListener("load", () => {
    loading.style.display = "none";
  });
}
</script>

</body>
</html>
