<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AttoShohoj 3D Science Library</title>

<!-- GLB viewer -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<!-- Three.js for PLY -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #1a1a1a, #000);
  color: white;
}

header {
  text-align: center;
  padding: 10px;
}

.container {
  display: grid;
  grid-template-columns: 1fr 280px;
  height: 90vh;
}

.viewer-box {
  position: relative;
  background: #111;
  overflow: hidden;
}

model-viewer, #plyViewer {
  width: 100%;
  height: 100%;
}

#loading {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 18px;
  z-index: 10;
}

.sidebar {
  background: #0d0d0d;
  padding: 10px;
  overflow-y: auto;
}

.category {
  margin-top: 10px;
  font-weight: bold;
  color: #00ffcc;
}

.item {
  padding: 8px;
  margin: 5px 0;
  background: #222;
  cursor: pointer;
  border-radius: 6px;
}

.item:hover {
  background: #333;
}
</style>
</head>

<body>

<header>
<h2>🚀 AttoShohoj 3D Science Library</h2>
</header>

<div class="container">

<!-- VIEWER -->
<div class="viewer-box">

  <div id="loading">Loading Model...</div>

  <!-- GLB -->
  <model-viewer
    id="glbViewer"
    src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
    camera-controls
    auto-rotate>
  </model-viewer>

  <!-- PLY -->
  <div id="plyViewer" style="display:none;"></div>

</div>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="category">🧬 Zoology</div>
<div class="item" onclick="loadGLB('zoology/heart.glb')">Heart (GLB)</div>
<div class="item" onclick="loadGLB('zoology/brain.glb')">Brain (GLB)</div>
<div class="item" onclick="loadPLY('zoology/anatomy/heart_anatomy.ply')">Heart Anatomy (PLY)</div>

<div class="category">🌿 Botany</div>
<div class="item" onclick="loadGLB('botany/leaf.glb')">Leaf</div>

<div class="category">⚗️ Chemistry</div>
<div class="item" onclick="loadGLB('chemistry/h2o.glb')">Water (H2O)</div>

<div class="category">⚙️ Physics</div>
<div class="item" onclick="loadGLB('physics/magnet.glb')">Magnet</div>

</div>

</div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { PLYLoader } from "three/addons/loaders/PLYLoader.js";

const glbViewer = document.getElementById("glbViewer");
const plyViewer = document.getElementById("plyViewer");
const loading = document.getElementById("loading");

// GLB loader
window.loadGLB = function(path){

  plyViewer.style.display = "none";
  glbViewer.style.display = "block";

  loading.style.display = "block";

  glbViewer.src = "models/" + path;

  glbViewer.addEventListener("load", () => {
    loading.style.display = "none";
  });
};

// PLY loader
window.loadPLY = function(path){

  glbViewer.style.display = "none";
  plyViewer.style.display = "block";
  plyViewer.innerHTML = "";

  loading.style.display = "block";

  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.z = 2;

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  plyViewer.appendChild(renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff, 2);
  light.position.set(1, 1, 1);
  scene.add(light);

  const loader = new PLYLoader();

  loader.load("models/" + path, function (geometry) {

    geometry.computeVertexNormals();

    const material = new THREE.MeshStandardMaterial({
      color: 0xffffff
    });

    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    loading.style.display = "none";
  });

};
</script>

</body>
</html>
