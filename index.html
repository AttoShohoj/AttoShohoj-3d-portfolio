<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AttoShohoj 3D Portfolio</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #1a1a1a, #000);
  color: white;
}

/* Header */
header {
  text-align: center;
  padding: 20px;
}

/* Layout */
.container {
  display: grid;
  grid-template-columns: 1fr 300px;
  height: 90vh;
}

/* Viewer */
viewer {
  display: flex;
  justify-content: center;
  align-items: center;
}

model-viewer {
  width: 100%;
  height: 90vh;
  background: #111;
}

/* Sidebar gallery */
.sidebar {
  background: #111;
  padding: 10px;
  overflow-y: auto;
}

.thumb {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  background: #222;
  cursor: pointer;
  border-radius: 8px;
  text-align: center;
}

.thumb:hover {
  background: #333;
}

/* Loading */
#loading {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 20px;
}
</style>
</head>

<body>

<header>
  <h1>🚀 AttoShohoj 3D Portfolio</h1>
</header>

<div class="container">

  <div style="position:relative;">
    <div id="loading">Loading 3D Model...</div>

    <model-viewer
      id="viewer"
      src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
      auto-rotate
      camera-controls
      onload="document.getElementById('loading').style.display='none'">
    </model-viewer>
  </div>

  <div class="sidebar">
    <h3>🎯 Models</h3>

    <div class="thumb" onclick="loadModel('Astronaut')">Astronaut</div>
    <div class="thumb" onclick="loadModel('RobotExpressive')">Robot</div>
    <div class="thumb" onclick="loadModel('Duck')">Duck</div>
  </div>

</div>

<script>
const viewer = document.getElementById("viewer");
const loading = document.getElementById("loading");

function loadModel(name) {
  loading.style.display = "block";

  const models = {
    Astronaut: "https://modelviewer.dev/shared-assets/models/Astronaut.glb",
    RobotExpressive: "https://modelviewer.dev/shared-assets/models/RobotExpressive.glb",
    Duck: "https://modelviewer.dev/shared-assets/models/Duck.glb"
  };

  viewer.src = models[name];

  setTimeout(() => {
    loading.style.display = "none";
  }, 1000);
}
</script>

</body>
</html>
