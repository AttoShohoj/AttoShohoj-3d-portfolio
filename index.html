<!DOCTYPE html>
<html>
<head>
  <title>AttoShohoj 3D Portfolio</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle, #222, #000);
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
    }

    h1 {
      font-size: 28px;
    }

    model-viewer {
      width: 100%;
      height: 85vh;
      background: transparent;
    }
  </style>
</head>

<body>

  <header>
    <h1>🚀 My 3D Portfolio</h1>
    <p>Rotate, Zoom & Explore</p>
  </header>

  <model-viewer
    src="model.glb"
    auto-rotate
    camera-controls
    shadow-intensity="1"
    ar>
  </model-viewer>

</body>
</html>
